<!doctype html><html><head><meta charset="utf-8"><title>Team Task Manager</title></head>
<body>
<h1>Team Task Manager</h1>
<p>Quick demo UI (use API for full functionality).</p>
<div>
  <h3>Signup/Login</h3>
  <input id="name" placeholder="name"><input id="email" placeholder="email"><input id="password" placeholder="password" type="password">
  <select id="role"><option value="member">member</option><option value="admin">admin</option></select>
  <button onclick="signup()">Signup</button><button onclick="login()">Login</button>
</div>
<div>
  <h3>Project</h3>
  <input id="pname" placeholder="project name"><button onclick="createProject()">Create Project (admin)</button>
</div>
<pre id="out"></pre>
<script src="/app.js"></script>
</body></html>
